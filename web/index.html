<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boxing Simulator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Boxing Simulator</h1>
            <nav>
                <button id="login-btn">Login</button>
                <button id="register-btn">Register</button>
                <button id="logout-btn" style="display: none;">Logout</button>
            </nav>
        </header>

        <main>
            <section id="auth-section" class="section">
                <div id="login-form" class="form-container">
                    <h2>Login</h2>
                    <form id="login-form-content">
                        <input type="text" id="username" placeholder="Username" required>
                        <input type="password" id="password" placeholder="Password" required>
                        <button type="submit">Login</button>
                    </form>
                </div>

                <div id="register-form" class="form-container">
                    <h2>Register</h2>
                    <form id="register-form-content">
                        <input type="text" id="reg-username" placeholder="Username" required>
                        <input type="email" id="reg-email" placeholder="Email" required>
                        <input type="password" id="reg-password" placeholder="Password" required>
                        <button type="submit">Register</button>
                    </form>
                </div>
            </section>

            <section id="dashboard-section" class="section" style="display: none;">
                <div class="dashboard-header">
                    <h2>Dashboard</h2>
                    <div id="user-info"></div>
                </div>

                <div class="dashboard-content">
                    <div class="boxer-section">
                        <h3>Your Boxers</h3>
                        <button id="create-boxer-btn">Create New Boxer</button>
                        <div id="boxers-list"></div>
                    </div>

                    <div class="fight-section">
                        <h3>Fight Arena</h3>
                        <div id="fight-arena">
                            <div id="boxer1-display" class="boxer-display">
                                <h4>Boxer 1</h4>
                                <div class="boxer-stats">
                                    <p>Health: <span id="boxer1-health">0</span></p>
                                    <p>Energy: <span id="boxer1-energy">0</span></p>
                                    <p>Strength: <span id="boxer1-strength">0</span></p>
                                </div>
                            </div>
                            <div class="fight-controls">
                                <button id="start-fight-btn">Start Fight</button>
                                <button id="reset-fight-btn">Reset</button>
                            </div>
                            <div id="boxer2-display" class="boxer-display">
                                <h4>Boxer 2</h4>
                                <div class="boxer-stats">
                                    <p>Health: <span id="boxer2-health">0</span></p>
                                    <p>Energy: <span id="boxer2-energy">0</span></p>
                                    <p>Strength: <span id="boxer2-strength">0</span></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="create-boxer-section" class="section" style="display: none;">
                <h2>Create New Boxer</h2>
                <form id="boxer-form">
                    <input type="text" id="boxer-name" placeholder="Boxer Name" required>
                    <select id="boxer-class">
                        <option value="heavyweight">Heavyweight</option>
                        <option value="middleweight">Middleweight</option>
                        <option value="lightweight">Lightweight</option>
                        <option value="flyweight">Flyweight</option>
                    </select>
                    <button type="submit">Create Boxer</button>
                </form>
            </section>
        </main>

        <div id="message"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
