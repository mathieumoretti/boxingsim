# .github/workflows/ci.yml
name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Install dependencies
      run: |
        go mod download
        go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

    - name: Run linters
      run: |
        go vet ./...
        golangci-lint version
        golangci-lint run ./...

    - name: Build application
      run: |
        go build -o boxing-server ./cmd/server

    - name: Run tests with gotestsum
      run: |
        # Try to install gotestsum if not available
        if ! command -v gotestsum > /dev/null 2>&1; then
          echo "Installing gotestsum..."
          GO111MODULE=on go install github.com/gotesttools/gotestsum@latest || echo "Failed to install gotestsum, falling back to standard go test"
        fi
        # Run tests with gotestsum if available, otherwise fall back to standard go test
        if command -v gotestsum > /dev/null 2>&1; then
          gotestsum --format=short-verbose ./...
        else
          go test -v ./...
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: boxing-server
        path: boxing-server