name: Test

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_boxing
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'

    - name: Install dependencies
      run: |
        go mod download
        # Try to install gotestsum if not available
        if ! command -v gotestsum > /dev/null 2>&1; then
          echo "Installing gotestsum..."
          GO111MODULE=on go install github.com/gotesttools/gotestsum@latest || echo "Failed to install gotestsum, continuing without it"
        fi

    - name: Run tests
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USER: test_user
        DB_PASSWORD: test_password
        DB_NAME: test_boxing
        REDIS_ADDR: localhost:6379
        JWT_SECRET: test-secret-key-change-in-production
      run: |
        # Run tests with gotestsum if available, otherwise fall back to standard go test
        if command -v gotestsum > /dev/null 2>&1; then
          gotestsum --format pkgname --jsonfile test-results.json ./...
        else
          echo "gotestsum not available, using standard go test"
          go test -v ./...
        fi

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: test-results.json